<!-- TradeFabric logo — dark background version (white ink + forest green) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 224 58" fill="none" role="img" aria-label="TradeFabric logo">
  <title>TradeFabric</title>

  <!-- Green: diagonal slash -->
  <polygon points="37,14  53,14  17,55  1,55" fill="#228B22"/>
  <!-- Green: F top bar -->
  <rect x="37" y="14" width="15" height="11" fill="#228B22"/>
  <!-- Green: F middle bar -->
  <rect x="27" y="30" width="15" height="10" fill="#228B22"/>

  <!-- White: T crossbar -->
  <rect x="1"  y="3"  width="51" height="11" rx="1" fill="#ffffff"/>
  <!-- White: T left stem -->
  <rect x="1" y="14" width="13" height="41" rx="0.5" fill="#ffffff"/>

  <!-- Wordmark -->
  <text
    x="63" y="32"
    font-family="'Inter','Arial Black',Arial,sans-serif"
    font-size="21" font-weight="900" fill="#ffffff" letter-spacing="2"
  >TRADE</text>
  <text
    x="127" y="32"
    font-family="'Inter','Arial Black',Arial,sans-serif"
    font-size="21" font-weight="900" fill="#228B22" letter-spacing="2"
  >FABRIC</text>
</svg>
