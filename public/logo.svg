<!-- TradeFabric logo — light background version (dark ink + forest green) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 224 58" fill="none" role="img" aria-label="TradeFabric logo">
  <title>TradeFabric</title>

  <!-- ══ TF ICON MARK ══════════════════════════════════════════════════ -->
  <!--  Canvas: 52 × 52, origin (0,3)                                     -->
  <!--  Render order: green first, dark on top to handle overlaps cleanly  -->

  <!-- Green: diagonal slash (left bar of F, slanted) -->
  <!-- Runs from top-right (x=36,y=3) down to bottom-left (x=0,y=55) -->
  <polygon points="37,14  53,14  17,55  1,55" fill="#228B22"/>

  <!-- Green: F top horizontal bar (below T crossbar) -->
  <rect x="37" y="14" width="15" height="11" fill="#228B22"/>

  <!-- Green: F middle horizontal bar -->
  <rect x="27" y="30" width="15" height="10" fill="#228B22"/>

  <!-- Dark: T crossbar — full width, drawn ON TOP of green -->
  <rect x="1"  y="3"  width="51" height="11" rx="1" fill="#1a1a1a"/>

  <!-- Dark: T left stem — drawn ON TOP of green diagonal at bottom-left -->
  <rect x="1" y="14" width="13" height="41" rx="0.5" fill="#1a1a1a"/>


  <!-- ══ WORDMARK ════════════════════════════════════════════════════════ -->
  <!-- "TRADE" — dark, bold, uppercase, tracked -->
  <text
    x="63" y="32"
    font-family="'Inter','Arial Black',Arial,sans-serif"
    font-size="21"
    font-weight="900"
    fill="#1a1a1a"
    letter-spacing="2"
  >TRADE</text>

  <!-- "FABRIC" — forest green, same weight & size -->
  <text
    x="127" y="32"
    font-family="'Inter','Arial Black',Arial,sans-serif"
    font-size="21"
    font-weight="900"
    fill="#228B22"
    letter-spacing="2"
  >FABRIC</text>
</svg>
