<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 50" fill="none">
  <!-- Icon box -->
  <rect x="1" y="1" width="46" height="46" rx="6" fill="white" stroke="#e5e7eb" stroke-width="1"/>
  <!-- T crossbar -->
  <rect x="7" y="9" width="32" height="7" rx="2" fill="#1a1a1a"/>
  <!-- T stem -->
  <rect x="19" y="16" width="10" height="10" rx="1" fill="#1a1a1a"/>
  <!-- Diagonal slash (green) -->
  <polygon points="30,9 36,9 18,37 12,37" fill="#22c55e"/>
  <!-- F right stem -->
  <rect x="28" y="26" width="10" height="7" rx="1" fill="#1a1a1a"/>
  <!-- F top bar -->
  <rect x="20" y="26" width="18" height="6" rx="1" fill="#1a1a1a"/>
  <!-- F mid bar -->
  <rect x="20" y="35" width="14" height="5" rx="1" fill="#1a1a1a"/>

  <!-- TRADE wordmark -->
  <text x="56" y="25" font-family="Inter,Arial,sans-serif" font-size="17" font-weight="800" fill="#1a1a1a" letter-spacing="-0.3">TRADE</text>
  <!-- FABRIC wordmark (green) -->
  <text x="108" y="25" font-family="Inter,Arial,sans-serif" font-size="17" font-weight="800" fill="#22c55e" letter-spacing="-0.3">FABRIC</text>
  <!-- Tagline -->
  <text x="57" y="39" font-family="Inter,Arial,sans-serif" font-size="6" font-weight="500" fill="#9ca3af" letter-spacing="2.2">PREMIUM PERFORMANCE TEXTILES</text>
</svg>
